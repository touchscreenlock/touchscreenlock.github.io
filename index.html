<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Touch Screen Lock - Block accidental taps on your Android device. Perfect for toddlers, kids videos, and preventing hang-ups.">
    <title>Touch Screen Lock - Block Accidental Taps</title>
    <style>
        :root {
            --primary-color: #0b45b3; /* Deep blue from your screenshots */
            --secondary-color: #1a5deb;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Hero Section */
        header {
            background: linear-gradient(135deg, #021a4f 0%, #1142b5 100%);
            color: white;
            text-align: center;
            padding: 4rem 1rem 3rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { 
            font-size: 2.8rem; 
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
        
        header p { 
            font-size: 1.2rem; 
            opacity: 0.9; 
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .hero-img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }

        .cta-button {
            display: inline-block;
            background-color: #00e676; /* Play Store Green accent */
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
            transition: all 0.3s ease;
        }

        .cta-button:hover { 
            background-color: #00c853; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 200, 83, 0.5);
        }

        /* Features Section */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .features {
            text-align: center;
        }

        .features h2 {
            color: var(--primary-color);
            margin-bottom: 3rem;
            font-size: 2.2rem;
            font-weight: 800;
        }

        /* Responsive Grid for Screenshots */
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            align-items: stretch;
        }

        .screenshot-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .screenshot-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .screenshot-card img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            border: 1px solid #eee;
        }

        /* Video Section */
        .video-section {
            text-align: center;
            margin-top: 5rem;
        }

        .video-section h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 800;
            padding: 0 1rem;
        }

        .video-wrapper {
            max-width: 320px; /* Optimal width for vertical shorts */
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            aspect-ratio: 9 / 16;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background-color: #e9ecef;
            color: #6c757d;
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            header p { font-size: 1rem; }
            .features h2 { font-size: 1.8rem; }
            .screenshot-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <header>
        <h1>Touch Screen Lock</h1>
        <p>Block Accidental Taps — Perfect for Toddlers & Kids Videos</p>
        
        <img src="featureImageClean.png" alt="Touch Screen Lock Feature Banner" class="hero-img">
        <br>
        
        <!-- Replace '#' with your actual Google Play Store link later -->
        <a href="https://play.google.com/store/apps/details?id=com.gngsoftware.touchscreenlock" class="cta-button">Download on Google Play</a>
    </header>

    <!-- Main Content -->
    <div class="container">
        <section class="features">
            <h2>App Features</h2>
            
            <div class="screenshot-grid">
                <!-- Vertical Screenshot 1 -->
                <div class="screenshot-card">
                    <img src="googlePlayScreenshot1_2_clean.png" alt="Block Accidental Taps">
                </div>
                
                <!-- Vertical Screenshot 2 -->
                <div class="screenshot-card">
                    <img src="googlePlayScreenshot2_2_clean.png" alt="1-Tap Lock Widget">
                </div>
                
                <!-- Vertical Screenshot 3 -->
                <div class="screenshot-card">
                    <img src="screenshot4_2.png" alt="Prevent Hang-ups">
                </div>
                
                <!-- Vertical Screenshot 4 -->
                <div class="screenshot-card">
                    <img src="googlePlayScreenshot3_2_clean.png" alt="Fingerprint Unlock">
                </div>
                
                <!-- App UI Screenshot -->
                <div class="screenshot-card">
                    <img src="mainAppPremScreen.jpg" alt="Touch Screen Lock Pro Interface">
                </div>
            </div>
        </section>
        <section class="video-section">
            <h2>How to enabled accessibility service and short demo of the app</h2>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/G8bBN8MsoKQ" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 G&G Software Ltd. All rights reserved.</p>
        <p><a href="https://sites.google.com/view/touch-screen-lock-privacy-pol">Privacy Policy</a> | <a href="https://sites.google.com/view/touch-screen-lock-terms-n-con">Terms of Service</a></p>
    </footer>

</body>
</html>
